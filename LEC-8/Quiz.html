<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>
    
    <!-- Quick Quiz
     without using br tag, write a vertically aligned form asking for name, city and pincode of a user -->
    
    <h3>Quiz - 1</h3>
    <form action="post">
        <div>
            <label for="username">Enter a username : </label>
            <input type="text" id="username" placeholder="Enter a username">
        </div>

        <div>
            <label for="city">Enter a city :</label>
            <input type="text id city" placeholder="Enter a city">
        </div>
        
        <div>
            <label for="pincode">Enter a pincode :</label>
            <input type="int" id="pincode" placeholder="Enter a pincode">
        </div>
    </form>

</body>

</html>
