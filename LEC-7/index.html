<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORMS & INPUT TAGS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="post">
        <h3>Form to apply for sigma web development course - TA
        </h3>
        <!-- INPUT TEXT   -->
        <div>
            <label for="username">Enter your username :</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div> <br>

        <!-- RADIO BUTTON -->
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div> <br>

        <div>
            <label for="comment">Enter your comment</label> <br>
            <textarea name="comment" id="comment"></textarea>
        </div> <br>

        <!-- SELECT TAG -->
         <div>
            <label for="fruits">Enter your favrioute fruits :</label>
            <select name="fruits" id="fruits">     
                <option value="apple">Apple</option>
                <option value="Mango">Mango</option>
                <option value="Orange">Orange</option>
                <option value="Grapes">Grapes</option>
            </select> 
         </div> <br>

        <!-- CHECK BOX -->
        <div>
            <label for="checkbox">Valid Details</label>
            <input type="checkbox">
        </div>
    </form>
</body>

</html>
