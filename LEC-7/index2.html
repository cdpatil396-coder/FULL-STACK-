<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Student Admission</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="post">
        <h3>MCA - STUDENT ADMISSION FORM</h3>
        <div>
            <label for="username">Enter your name :</label>
            <input type="text" id="username" placeholder="Enter your name">
        </div><br>

        <div>
            <label for="rollno">Enter your rollno  :</label>
            <input type="int" id="rollno" placeholder="Enter your rollno">
        </div><br>

        <div>
            <label for="mobile">Enter your mobile no :</label>
            <input type="int" id="mobile" placeholder="Enter mobile no">
        </div><br>

        <div>
            <label for="gender">Enter your Gender</label><br>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="male">

            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" value="female">
        </div><br>

        <div>
            <label for="collage">Select your collage</label>
            <select name="collage" id="collage">
                <option value="choose">choose collage</option>
                <option value="KBCNMU">KBCNMU</option>
                <option value="VSNAIK">VSNAIK</option>
                <option value="MVMW">MVMW</option>
            </select>
        </div><br>
        
        <!-- <div>
            <ul>
                <li>village</li>
                <li></li>
                <li></li>
            </ul>
        </div> -->
        <div>
            <label for="address">Enter your Address:</label><br>
            <textarea name="address" id="address" placeholder="enter address">

            </textarea>
        </div>

        <div>
            
        </div>

    </form>
</body>
</html>
